<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Reportar Incidente</title>
</head>

<body>

    <header>
        <h1>Registro de Incidentes</h1>
    </header>

    <nav>
        <a href="index.html">Inicio</a> |
        <a href="reportar.html">Reportar Incidente</a> |
        <a href="tickets.html">Tickets</a>
    </nav>

    <main>

        <section>

            <h2>Formulario de Reporte</h2>

            <form>

                <article>

                    <label for="titulo">Título del incidente:</label><br>
                    <input type="text" id="titulo" name="titulo" required>

                </article>

                <br>

                <article>

                    <label for="categoria">Categoría:</label><br>

                    <select id="categoria" name="categoria">

                        <option value="">Seleccione</option>
                        <option value="red">Red</option>
                        <option value="hardware">Hardware</option>
                        <option value="software">Software</option>

                    </select>

                </article>

                <br>

                <article>

                    <p>Prioridad:</p>

                    <input type="radio" id="alta" name="prioridad" value="Alta">
                    <label for="alta">Alta</label>

                    <input type="radio" id="media" name="prioridad" value="Media">
                    <label for="media">Media</label>

                    <input type="radio" id="baja" name="prioridad" value="Baja">
                    <label for="baja">Baja</label>

                </article>

                <br>

                <article>

                    <label for="descripcion">
                        Descripción detallada:
                    </label><br>

                    <textarea id="descripcion" name="descripcion" rows="6" cols="50">
</textarea>

                </article>

                <br>

                <input type="submit" value="Enviar Reporte">
                <input type="reset" value="Limpiar Formulario">

            </form>

        </section>

    </main>

    <footer>
        <p>Departamento de Soporte Técnico</p>
    </footer>

</body>

</html>
